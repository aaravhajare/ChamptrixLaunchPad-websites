<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Basic Site</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; }
    header { background: #007bff; color: #fff; padding: 40px 20px; text-align: center; }
    header h1 { font-size: 2.5rem; }
    header p { margin-top: 10px; font-size: 1.1rem; }
    section { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .card { background: #fff; padding: 20px; margin: 20px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .card h2 { color: #007bff; margin-bottom: 10px; }
    footer { text-align: center; padding: 20px; background: #333; color: #fff; margin-top: 40px; }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My Site</h1>
    <p>A simple and clean basic HTML website.</p>
  </header>

  <section>
    <div class="card">
      <h2>About</h2>
      <p>This is a minimal HTML website to showcase a basic layout with header, about section, and footer.</p>
    </div>
    <div class="card">
      <h2>Features</h2>
      <p>- Semantic HTML</p>
      <p>- Responsive layout</p>
      <p>- Clean CSS styling</p>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Basic HTML Site. All rights reserved.</p>
  </footer>
</body>
</html>
